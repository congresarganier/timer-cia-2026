<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minuteur — CIA26 Essaouira 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:#F7F9F7;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  overflow:hidden;
}

.congress{
  font-size:12px;color:#888888;
  letter-spacing:3px;text-transform:uppercase;
  margin-bottom:2rem;text-align:center;
}

.timer-circle{
  width:340px;height:340px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin-bottom:2.5rem;position:relative;
  transition:border-color .5s;
}
.timer-circle.warning .ring-fill{stroke:#E67E22}
.timer-circle.danger  .ring-fill{stroke:#C0392B;animation:pulse-ring 1s infinite}

@keyframes pulse-ring{
  0%,100%{filter:drop-shadow(0 0 0px rgba(192,57,43,0))}
  50%     {filter:drop-shadow(0 0 16px rgba(192,57,43,.7))}
}

.progress-ring{
  position:absolute;top:0;left:0;
  width:340px;height:340px;
  transform:rotate(-90deg);
}
.ring-bg  {fill:none;stroke:rgba(0,0,0,.08);stroke-width:8}
.ring-fill{
  fill:none;stroke:#C8952A;stroke-width:8;
  stroke-linecap:round;
  transition:stroke-dashoffset .8s linear, stroke .5s;
}

.time-display{
  font-size:96px;font-weight:500;color:#2E5338;
  line-height:1;letter-spacing:4px;
  transition:color .5s;
  position:relative;z-index:1;
}
.time-display.warning{color:#F39C12}
.time-display.danger {color:#E74C3C;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

.time-label{
  font-size:12px;color:#999999;
  margin-top:10px;letter-spacing:3px;text-transform:uppercase;
  position:relative;z-index:1;
}

/* Presets */
.presets{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;justify-content:center}
.preset{
  padding:8px 18px;border-radius:50px;
  border:1px solid rgba(0,0,0,.15);
  background:transparent;color:#555555;
  font-size:13px;cursor:pointer;
  transition:all .15s;font-family:'DM Sans',sans-serif;
}
.preset.active{background:#C8952A;color:#2E5338;border-color:#C8952A;font-weight:500}
.preset:hover:not(.active){border-color:rgba(255,255,255,.5);color:#2E5338}
.preset:active{transform:scale(.95)}

/* Controls */
.controls{display:flex;gap:12px;margin-bottom:1.5rem}
.btn{
  padding:14px 36px;border-radius:50px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  transition:all .15s;min-width:140px;
}
.btn-start{background:#C8952A;color:#fff}
.btn-start:hover{background:#d9a230}
.btn-reset {background:rgba(0,0,0,.06);color:#444;border:1px solid rgba(0,0,0,.15)}
.btn-reset:hover{background:rgba(0,0,0,.1)}
.btn:active{transform:scale(.96)}

/* Status */
.status-bar{
  font-size:13px;color:#AAAAAA;
  letter-spacing:1.5px;text-transform:uppercase;
  height:22px;text-align:center;transition:color .3s;
}
.status-bar.running {color:#555}
.status-bar.paused  {color:#999}
.status-bar.warning {color:#F39C12;font-weight:500}
.status-bar.danger  {color:#E74C3C;font-weight:500;animation:blink 1s step-end infinite}

/* Logo bottom */
.logo-wrap{
  position:fixed;bottom:20px;
  font-size:11px;color:#CCCCCC;
  letter-spacing:2px;text-transform:uppercase;
  text-align:center;
}

/* Fullscreen hint */
.hint{
  position:fixed;top:14px;right:18px;
  font-size:11px;color:#CCCCCC;
  cursor:pointer;
}
.hint:hover{color:#888}
</style>
</head>

<div class="congress">8ème Congrès International de l'Arganier · Essaouira 2026</div>

<div class="timer-circle" id="circle">
  <svg class="progress-ring" id="svg" viewBox="0 0 340 340">
    <circle class="ring-bg"   cx="170" cy="170" r="158"/>
    <circle class="ring-fill" id="ring" cx="170" cy="170" r="158"/>
  </svg>
  <div class="time-display" id="display">10:00</div>
  <div class="time-label" id="label">minutes</div>
</div>

<div class="presets">
  <button class="preset active" onclick="setDuration(10,this)">10 min</button>
  <button class="preset"        onclick="setDuration(7,this)">7 min</button>
  <button class="preset"        onclick="setDuration(5,this)">5 min</button>
  <button class="preset"        onclick="setDuration(2,this)">2 min</button>
</div>

<div class="controls">
  <button class="btn btn-start" id="startBtn" onclick="toggle()">Démarrer</button>
  <button class="btn btn-reset" onclick="reset()">Réinitialiser</button>
</div>

<div class="status-bar" id="statusBar">Prêt</div>

<div class="logo-wrap">www.congresarganier.ma</div>

<div class="hint" onclick="toggleFS()" title="Plein écran">⛶ Plein écran</div>

<script>
const R = 158;
const C = 2 * Math.PI * R; // circumference

let total     = 600;
let remaining = 600;
let running   = false;
let interval  = null;
let warned    = false; // 2-min warning triggered

const displayEl = document.getElementById('display');
const circleEl  = document.getElementById('circle');
const ringEl    = document.getElementById('ring');
const startBtn  = document.getElementById('startBtn');
const statusBar = document.getElementById('statusBar');
const labelEl   = document.getElementById('label');

ringEl.style.strokeDasharray  = C;
ringEl.style.strokeDashoffset = 0;

function fmt(s){
  const m   = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function updateUI(){
  displayEl.textContent = fmt(remaining);

  const pct    = total > 0 ? remaining / total : 0;
  const offset = C * (1 - pct);
  ringEl.style.strokeDashoffset = offset;

  const isWarning = remaining <= 120 && remaining > 0;
  const isDanger  = remaining === 0;

  // Circle class
  circleEl.className = 'timer-circle' + (isDanger ? ' danger' : isWarning ? ' warning' : '');
  // Display class
  displayEl.className = 'time-display' + (isDanger ? ' danger' : isWarning ? ' warning' : '');
  // Ring color via parent class — handled by CSS
  ringEl.className = 'ring-fill' + (isDanger ? ' danger' : isWarning ? ' warning' : '');

  // Status bar
  if(isDanger){
    statusBar.textContent = '⏱ Temps écoulé !';
    statusBar.className   = 'status-bar danger';
    labelEl.textContent   = 'terminé';
  } else if(isWarning){
    statusBar.textContent = '2 minutes restantes — signal jaune';
    statusBar.className   = 'status-bar warning';
  } else if(running){
    statusBar.textContent = 'En cours...';
    statusBar.className   = 'status-bar running';
  }
}

function toggle(){
  if(remaining === 0){ reset(); return; }
  if(running){
    clearInterval(interval);
    running = false;
    startBtn.textContent  = 'Reprendre';
    statusBar.textContent = 'En pause';
    statusBar.className   = 'status-bar paused';
  } else {
    running = true;
    startBtn.textContent = 'Pause';
    interval = setInterval(()=>{
      remaining--;
      updateUI();
      // 2-min audio beep
      if(remaining === 120 && !warned){
        warned = true;
        beep(440, 300);
      }
      if(remaining === 0){
        clearInterval(interval);
        running = false;
        startBtn.textContent = 'Réinitialiser';
        beep(880, 800);
      }
    }, 1000);
  }
}

function reset(){
  clearInterval(interval);
  running   = false;
  warned    = false;
  remaining = total;
  startBtn.textContent  = 'Démarrer';
  statusBar.textContent = 'Prêt';
  statusBar.className   = 'status-bar';
  labelEl.textContent   = 'minutes';
  updateUI();
}

function setDuration(min, btn){
  document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  total = min * 60;
  clearInterval(interval);
  running = false;
  warned  = false;
  remaining = total;
  startBtn.textContent  = 'Démarrer';
  statusBar.textContent = 'Prêt';
  statusBar.className   = 'status-bar';
  labelEl.textContent   = 'minutes';
  updateUI();
}

function beep(freq, duration){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration/1000);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration/1000);
  } catch(e){}
}

function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen().catch(()=>{});
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if(e.code === 'Space'){ e.preventDefault(); toggle(); }
  if(e.code === 'KeyR')  reset();
  if(e.code === 'KeyF')  toggleFS();
});

updateUI();
</script>
</body>
</html>
